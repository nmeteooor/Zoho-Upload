<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Загрузка кандидатов → Zoho</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #f87171;
    --success: #6ee7b7;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(110,231,183,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(129,140,248,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .wrap {
    width: 100%;
    max-width: 520px;
    position: relative;
  }

  .header {
    margin-bottom: 2.5rem;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.1s;
  }

  .tag::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 0.75rem;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.2s;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 400;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.3s;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.4s;
  }

  .drop-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    margin-bottom: 1.5rem;
    background: rgba(255,255,255,0.01);
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(110,231,183,0.03);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: rgba(110,231,183,0.08);
    border: 1px solid rgba(110,231,183,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
    font-size: 20px;
    transition: transform 0.2s;
  }

  .drop-zone:hover .drop-icon { transform: scale(1.05); }

  .drop-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .drop-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .file-selected {
    display: none;
    align-items: center;
    gap: 10px;
    background: rgba(110,231,183,0.06);
    border: 1px solid rgba(110,231,183,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 1.5rem;
    font-size: 13px;
  }

  .file-selected.show { display: flex; }
  .file-icon { font-size: 18px; }
  .file-name { flex: 1; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-remove { cursor: pointer; color: var(--muted); font-size: 16px; flex-shrink: 0; transition: color 0.15s; }
  .file-remove:hover { color: var(--danger); }

  .field {
    margin-bottom: 1rem;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  select, input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--accent2);
  }

  select option { background: #1a1a2e; }

  .btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:hover:not(:disabled) { background: #a7f3d0; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .status {
    margin-top: 1rem;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .status.show { display: flex; }
  .status.loading { background: rgba(129,140,248,0.08); border: 1px solid rgba(129,140,248,0.2); color: var(--accent2); }
  .status.success { background: rgba(110,231,183,0.08); border: 1px solid rgba(110,231,183,0.2); color: var(--accent); }
  .status.error { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: var(--danger); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(129,140,248,0.3);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .flow {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.5s;
  }

  .flow-step {
    flex: 1;
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    line-height: 1.4;
  }

  .flow-step span {
    display: block;
    font-size: 16px;
    margin-bottom: 4px;
  }

  .flow-arrow { color: var(--border); font-size: 14px; flex-shrink: 0; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="tag">Recruiting automation</div>
    <h1>Загрузи <span>CSV</span><br>— остальное сделает агент</h1>
    <p class="subtitle">Скачай CSV из Metaview и загрузи сюда. Make автоматически создаст кандидатов в Zoho Recruit.</p>
  </div>

  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".csv">
      <div class="drop-icon">📄</div>
      <div class="drop-title">Перетащи CSV или нажми для выбора</div>
      <div class="drop-sub">только .csv файлы от Metaview</div>
    </div>

    <div class="file-selected" id="fileSelected">
      <span class="file-icon">✅</span>
      <span class="file-name" id="fileName"></span>
      <span class="file-remove" id="fileRemove">✕</span>
    </div>

    <div class="field">
      <label>Кто загружает</label>
      <select id="recruiter">
        <option value="">— выбери рекрутера —</option>
        <option>Nikita Shevchenko</option>
        <option>Saniia Soleikina</option>
        <option>Recruiter 3</option>
      </select>
    </div>

    <div class="field">
      <label>Источник кандидатов</label>
      <select id="source">
        <option value="Metaview">Metaview</option>
        <option value="LinkedIn">LinkedIn</option>
        <option value="Djinni">Djinni</option>
        <option value="Referral">Referral</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <button class="btn" id="uploadBtn" disabled>
      <span id="btnText">↑ Отправить в Zoho</span>
    </button>

    <div class="status" id="status"></div>
  </div>

  <div class="flow">
    <div class="flow-step"><span>📥</span>CSV от Metaview</div>
    <div class="flow-arrow">→</div>
    <div class="flow-step"><span>⚡</span>Make агент</div>
    <div class="flow-arrow">→</div>
    <div class="flow-step"><span>🗃️</span>Zoho Recruit</div>
  </div>
</div>

<script>
  const WEBHOOK_URL = 'https://hook.eu1.make.com/vog9v1yaoyxpwidhjd8p3ey4noqlwmcv';

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileSelected = document.getElementById('fileSelected');
  const fileName = document.getElementById('fileName');
  const fileRemove = document.getElementById('fileRemove');
  const uploadBtn = document.getElementById('uploadBtn');
  const btnText = document.getElementById('btnText');
  const status = document.getElementById('status');
  const recruiter = document.getElementById('recruiter');
  const source = document.getElementById('source');

  let selectedFile = null;

  function setFile(file) {
    if (!file || !file.name.endsWith('.csv')) {
      showStatus('error', '⚠️ Пожалуйста, выбери файл формата .csv');
      return;
    }
    selectedFile = file;
    fileName.textContent = file.name;
    dropZone.style.display = 'none';
    fileSelected.classList.add('show');
    checkReady();
  }

  function clearFile() {
    selectedFile = null;
    fileInput.value = '';
    dropZone.style.display = '';
    fileSelected.classList.remove('show');
    checkReady();
    status.classList.remove('show');
  }

  function checkReady() {
    uploadBtn.disabled = !(selectedFile && recruiter.value);
  }

  fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
  fileRemove.addEventListener('click', clearFile);
  recruiter.addEventListener('change', checkReady);

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  function showStatus(type, msg) {
    status.className = 'status show ' + type;
    if (type === 'loading') {
      status.innerHTML = '<div class="spinner"></div><span>' + msg + '</span>';
    } else {
      status.innerHTML = '<span>' + msg + '</span>';
    }
  }

  uploadBtn.addEventListener('click', async () => {
    if (!selectedFile || !recruiter.value) return;

    uploadBtn.disabled = true;
    btnText.textContent = 'Отправляем...';
    showStatus('loading', 'Отправляем кандидатов в Make...');

    try {
      const text = await selectedFile.text();

      // Parse CSV
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
      const candidates = [];

      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        // Handle quoted fields
        const values = [];
        let current = '';
        let inQuotes = false;
        for (let ch of lines[i]) {
          if (ch === '"') { inQuotes = !inQuotes; }
          else if (ch === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
          else { current += ch; }
        }
        values.push(current.trim());

        const candidate = {};
        headers.forEach((h, idx) => { candidate[h] = values[idx] || ''; });
        candidates.push(candidate);
      }

      const now = new Date();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      const year = now.getFullYear();
      const lead_assigning_date = year + "-" + month + "-" + day;

      const payload = {
        recruiter: recruiter.value,
        source: source.value,
        uploaded_at: new Date().toISOString(),
        file_name: selectedFile.name,
        lead_assigning_date: lead_assigning_date,
        candidates: candidates
      };

      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        showStatus('success', `✅ Готово! ${candidates.length} кандидатов отправлено в Zoho Recruit.`);
        btnText.textContent = '↑ Отправить в Zoho';
        clearFile();
      } else {
        throw new Error('HTTP ' + response.status);
      }
    } catch (err) {
      showStatus('error', '❌ Ошибка: ' + err.message + '. Попробуй ещё раз.');
      btnText.textContent = '↑ Отправить в Zoho';
      uploadBtn.disabled = false;
    }
  });
</script>
</body>
</html>
